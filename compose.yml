services:
  postgres:
    image: postgres:16
    container_name: timelinelp_db
    environment:
      POSTGRES_DB: timelinelp
      POSTGRES_USER: timelinelp
      POSTGRES_PASSWORD: timelinelp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: